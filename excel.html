    <meta charset='utf-8' />
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf6e3; padding: 20px; }
        #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .fc .fc-toolbar-title { color: #856404; }
        .message-box { max-width: 900px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #d35400; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #a04000; }
    </style>
</head>
<body>

<div id='calendar'></div>

<div class="message-box">
    <h3>Acharya Ji ko Message bhejein</h3>
    <input type="text" id="userName" placeholder="Aapka Naam">
    <input type="text" id="userPhone" placeholder="Aapka Phone Number">
    <textarea id="userMsg" placeholder="Aapka Sawal/Sandesh"></textarea>
    <button onclick="sendMessage()">WhatsApp par Message Bhejein</button>
    
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: [
                { title: 'Acharya Sharma (Delhi)', start: '2026-06-15', end: '2026-06-18', color: '#e67e22' },
                { title: 'Acharya Varma (Mumbai)', start: '2026-06-20', end: '2026-06-25', color: '#2980b9' },
                { title: 'Acharya Gupta (Bangalore)', start: '2026-07-05', end: '2026-07-07', color: '#27ae60' },
                { title: 'Acharya Mishra (Jaipur)', start: '2026-07-12', end: '2026-07-16', color: '#8e44ad' }
            ]
        });
        calendar.render();
    });

    function sendMessage() {
        const name = document.getElementById('userName');
        const phone = document.getElementById('userPhone');
        const msg = document.getElementById('userMsg');
        
        if(name.value && phone.value && msg.value) {
            // Yahan par 91XXXXXXXXXX ki jagah Acharya Ji ka WhatsApp number daalein
            const whatsappUrl = `https://wa.me/919813132098?text=Hello Acharya Ji, Mera naam ${name.value} hai. Mera phone number ${phone.value} hai. Message: ${msg.value}`;
            window.open(whatsappUrl, '_blank');
        } else {
            alert("Kripya sabhi fields bharein!");
        }
    }
</script>
</body>
</html>
